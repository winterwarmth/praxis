<app-search-bar placeholder="Search listings..." (search)="onSearch($event)" />
<div class="home-layout">
  <app-listing-filter (sortChange)="onSort($event)" (select)="onFilter($event)" (priceChange)="onPriceFilter($event)" (paymentChange)="onPaymentFilter($event)" (courseChange)="onCourseFilter($event)" />
  <div class="listings-grid">
    @for (listing of listings(); track listing.id) {
      <app-listing-card
        [id]="listing.id"
        [title]="listing.title"
        [price]="listing.price"
        [category]="listing.category"
        [condition]="listing.condition"
        [imageUrl]="listing.imageUrl"
      />
    }
  </div>
</div>
