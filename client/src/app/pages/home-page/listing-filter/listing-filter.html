<aside class="filter-sidebar">
  <h3>Sort By</h3>
  <select [value]="sortBy()" (change)="onSortChange($event)">
    @for (option of sortOptions; track option.value) {
      <option [value]="option.value">{{ option.label }}</option>
    }
  </select>

  <h3>Categories</h3>
  @for (category of categories; track category) {
    <button
      [class.active]="selected() === category"
      (click)="onSelect(category)">
      {{ category }}
    </button>
  }

  <h3>Price</h3>
  <div class="price-range">
    <input
      type="number"
      placeholder="Min"
      [value]="priceMin()"
      (input)="onPriceMinInput($event)"
      min="0"
      [disabled]="freeOnly()"
    />
    <span>-</span>
    <input
      type="number"
      placeholder="Max"
      [value]="priceMax()"
      (input)="onPriceMaxInput($event)"
      min="0"
      [disabled]="freeOnly()"
    />
  </div>

  <h3>Condition</h3>
  <select [value]="minCondition()" (change)="onConditionChange($event)">
    @for (cond of conditionOptions; track cond.value) {
      <option [value]="cond.value">{{ cond.label }}</option>
    }
  </select>

  <h3>Payment</h3>
  @for (method of paymentMethods; track method.value) {
    <label class="checkbox-label">
      <input
        type="checkbox"
        [checked]="selectedPayments().includes(method.value)"
        (change)="onTogglePayment(method.value)"
      />
      {{ method.label }}
    </label>
  }

  <h3>Course</h3>
  <div class="course-filter">
    <input
      type="text"
      class="course-input"
      placeholder="e.g. CSC 4350"
      [value]="courseQuery()"
      (input)="onCourseInput($event)"
    />
    @if (selectedCourse()) {
      <button class="clear-course" (click)="clearCourse()">✕</button>
    }
  </div>
  @if (filteredCourses().length > 0) {
    <div class="course-results">
      @for (course of filteredCourses(); track course.id) {
        <button
          class="course-result-item"
          [class.active]="selectedCourse()?.id === course.id"
          (click)="selectCourse(course)"
        >
          {{ course.subjectCode }} {{ course.courseNumber }}
        </button>
      }
    </div>
  }
</aside>
