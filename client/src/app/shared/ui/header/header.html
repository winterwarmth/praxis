<header>
  <a routerLink="/" class="site-logo" draggable="false">
    <ng-icon name="lucideGraduationCap"></ng-icon>
    Praxis
  </a>
  @if (authService.isAuthenticated()) {
    <app-navbar></app-navbar>
    <div class="header-actions">
      <a routerLink="/messages" class="icon-btn badge-btn" draggable="false" aria-label="Messages">
        <ng-icon name="lucideMessageCircle"></ng-icon>
        @if (unreadMessageCount() > 0) {
          <span class="badge">{{ unreadMessageCount() }}</span>
        }
      </a>

      @if (authService.isAdmin()) {
        <a routerLink="/admin" class="icon-btn" draggable="false" aria-label="Admin dashboard" title="Admin">
          <ng-icon name="lucideShield"></ng-icon>
        </a>
      }

      <a [routerLink]="['/u', authService.user()?.user_metadata?.['username'] || 'me']" class="profile-link" draggable="false" aria-label="Profile">
        @if (profileImageUrl()) {
          <img class="header-avatar" [src]="profileImageUrl()" alt="Profile" />
        } @else {
          <ng-icon name="lucideCircleUserRound"></ng-icon>
        }
        @if (authService.user(); as user) {
          <span class="profile-name">{{ user.user_metadata['first_name'] || 'Profile' }}</span>
        }
      </a>
      <button class="icon-btn logout-btn" aria-label="Log out" (click)="onLogout()">
        <ng-icon name="lucideLogOut"></ng-icon>
      </button>
    </div>
  }
</header>
